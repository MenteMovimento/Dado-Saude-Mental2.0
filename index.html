<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Dado da Saúde Mental - RV</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0f2d66;
      font-family: 'Segoe UI', sans-serif;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      pointer-events: none;
      z-index: 10;
      padding: 0 20px;
    }
    #info small {
      font-weight: normal;
      opacity: 0.8;
    }
    #resultado {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.9);
      padding: 16px 28px;
      border-radius: 40px;
      color: #0f2d66;
      font-size: 22px;
      font-weight: 800;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      display: none;
      z-index: 10;
      text-align: center;
      white-space: nowrap;
      border: 3px solid #f5b800;
    }
    #resultado span {
      display: block;
      font-weight: 400;
      font-size: 14px;
      color: #475569;
      margin-top: 4px;
    }
    @media (max-width: 600px) {
      #resultado { font-size: 18px; padding: 12px 20px; white-space: normal; }
      #info { font-size: 14px; top: 10px; }
    }
  </style>
</head>
<body>
  <div id="info">🧠 Dado da Saúde Mental <small>— Toca no ecrã para girar</small></div>
  <div id="resultado">🎲 <strong id="faceNome">CUIDA</strong><span id="faceDesc">Uma pequena ação de cuidado</span></div>

  <!-- Importação da biblioteca Three.js + VR -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { VRButton } from 'three/addons/webxr/VRButton.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // Configuração da cena
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f2d66);

    // Câmara
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.5, 5);
    camera.lookAt(0, 0, 0);

    // Renderizador
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Botão de RV (modo binocular / telemóvel no óculos)
    document.body.appendChild(VRButton.createButton(renderer));

    // Luzes
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(2, 5, 3);
    scene.add(dirLight);
    const backLight = new THREE.DirectionalLight(0x4488ff, 0.5);
    backLight.position.set(-2, 0, -3);
    scene.add(backLight);

    // ----- CRIAR O DADO 3D -----
    const tamanho = 1.8;
    const geometry = new THREE.BoxGeometry(tamanho, tamanho, tamanho);
    
    // Cores e nomes das faces
    const facesData = [
      { nome: 'CUIDA',    cor: 0xe11d25, desc: 'Beber água, descansar, pedir ajuda' },
      { nome: 'RECOMEÇA', cor: 0x009c9c, desc: 'Tenta outra vez com calma' },
      { nome: 'ESCUTA',   cor: 0xf5b800, desc: 'Atenção sem pressa' },
      { nome: 'EQUILIBRA',cor: 0x3c8f25, desc: 'Larga o que pesa, mantém o que ajuda' },
      { nome: 'ABRANDA',  cor: 0xf26a00, desc: 'Abranda o ritmo antes de agir' },
      { nome: 'RESPIRA',  cor: 0x007bd1, desc: 'Inspira 4s, expira 6s' }
    ];

    // Criar materiais para cada face (com texto)
    const materials = facesData.map(f => {
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext('2d');

      // Fundo
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, 512, 512);
      
      // Borda colorida
      ctx.strokeStyle = '#' + f.cor.toString(16).padStart(6, '0');
      ctx.lineWidth = 20;
      ctx.strokeRect(20, 20, 472, 472);

      // Nome grande
      ctx.fillStyle = '#' + f.cor.toString(16).padStart(6, '0');
      ctx.font = 'bold 80px Segoe UI, Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(f.nome, 256, 220);

      // Descrição pequena
      ctx.fillStyle = '#334155';
      ctx.font = '28px Segoe UI, Arial';
      ctx.fillText(f.desc, 256, 340);

      // Emoji
      ctx.font = '60px Arial';
      ctx.fillText('🧠', 256, 100);

      const texture = new THREE.CanvasTexture(canvas);
      return new THREE.MeshStandardMaterial({ map: texture, roughness: 0.3, metalness: 0.1 });
    });

    const dice = new THREE.Mesh(geometry, materials);
    dice.position.y = 0.2;
    scene.add(dice);

    // Adicionar um chão/anel suave
    const ringGeo = new THREE.RingGeometry(1.2, 1.6, 64);
    const ringMat = new THREE.MeshStandardMaterial({
      color: 0x3b82f6,
      transparent: true,
      opacity: 0.2,
      side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = -0.9;
    scene.add(ring);

    // Luz ambiente suave ao redor
    const glowPoints = new THREE.PointLight(0x4488ff, 0.3, 8);
    glowPoints.position.set(0, 2, 0);
    scene.add(glowPoints);

    // ----- CONTROLE DE ROTAÇÃO -----
    let isSpinning = false;
    let currentRotation = 0;
    const facesMap = [
      'CUIDA', 'RECOMEÇA', 'ESCUTA', 'EQUILIBRA', 'ABRANDA', 'RESPIRA'
    ];

    function girarDado() {
      if (isSpinning) return;
      isSpinning = true;

      // Escolher uma face aleatória
      const idx = Math.floor(Math.random() * facesData.length);
      const faceNome = facesData[idx].nome;
      const faceDesc = facesData[idx].desc;
      const faceCor = facesData[idx].cor;

      // Calcular rotação para aquela face ficar para cima
      // Cada face tem um eixo de rotação específico
      const rotacoes = {
        'CUIDA':    { x: 0, y: 0 },
        'RECOMEÇA': { x: 0, y: Math.PI },
        'ESCUTA':   { x: 0, y: -Math.PI/2 },
        'EQUILIBRA':{ x: 0, y: Math.PI/2 },
        'ABRANDA':  { x: -Math.PI/2, y: 0 },
        'RESPIRA':  { x: Math.PI/2, y: 0 }
      };

      const rot = rotacoes[faceNome];
      // Adicionar voltas extras para efeito de giro
      const extraX = rot.x + (Math.random() * 8 + 4) * Math.PI * 2;
      const extraY = rot.y + (Math.random() * 8 + 4) * Math.PI * 2;

      // Animar rotação com GSAP (ou transição manual)
      const startX = dice.rotation.x;
      const startY = dice.rotation.y;
      const duration = 2500;
      const startTime = performance.now();

      function animateRotation() {
        const elapsed = performance.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        // Easing suave
        const eased = 1 - Math.pow(1 - progress, 3);
        
        dice.rotation.x = startX + (extraX - startX) * eased;
        dice.rotation.y = startY + (extraY - startY) * eased;

        if (progress < 1) {
          requestAnimationFrame(animateRotation);
        } else {
          dice.rotation.x = extraX;
          dice.rotation.y = extraY;
          isSpinning = false;
          mostrarResultado(faceNome, faceDesc, faceCor);
        }
      }
      animateRotation();
    }

    function mostrarResultado(nome, desc, cor) {
      const el = document.getElementById('resultado');
      const nomeEl = document.getElementById('faceNome');
      const descEl = document.getElementById('faceDesc');
      nomeEl.textContent = nome;
      nomeEl.style.color = '#' + cor.toString(16).padStart(6, '0');
      descEl.textContent = desc;
      el.style.display = 'block';
      setTimeout(() => {
        el.style.display = 'none';
      }, 6000);
    }

    // Evento de toque/clique
    renderer.domElement.addEventListener('click', girarDado);
    renderer.domElement.addEventListener('touchstart', girarDado);

    // Controles para desktop (opcional, mas útil)
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.autoRotate = false;
    controls.enableZoom = true;
    controls.target.set(0, 0, 0);
    controls.maxPolarAngle = Math.PI / 2;

    // Ajustar para RV
    function onResize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      renderer.setSize(width, height);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', onResize);

    // Loop de renderização
    function animate() {
      renderer.setAnimationLoop(() => {
        // Se não estiver em RV, atualizar controles
        if (!renderer.xr.isPresenting) {
          controls.update();
        }
        renderer.render(scene, camera);
      });
    }
    animate();

    // Pequena rotação automática quando parado (opcional)
    let idleRotation = 0;
    setInterval(() => {
      if (!isSpinning && !renderer.xr.isPresenting) {
        idleRotation += 0.002;
        // Não acumular muito
        if (idleRotation > 0.1) idleRotation = 0;
        dice.rotation.y += idleRotation * 0.5;
      }
    }, 50);

    console.log('🧠 Dado da Saúde Mental em RV pronto!');
    console.log('📱 Coloca o telemóvel nos óculos e diverte-te!');
  </script>
</body>
</html>
